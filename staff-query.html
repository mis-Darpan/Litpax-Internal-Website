<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Query — Litpax Technology</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(30,27,75,.1);
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8eaf2;
    }
    .brand-logo {
      width: 36px; height: 36px;
      background: #4f46e5;
      border-radius: 9px;
      color: #fff;
      font-weight: 800;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand h1 { font-size: 15px; font-weight: 700; color: #1e1b4b; }
    .brand p  { font-size: 11px; color: #64748b; margin-top: 1px; }

    h2 { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 22px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 14px; }
    label { font-size: 11px; font-weight: 600; color: #64748b; display: block; margin-bottom: 5px; }

    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #f8fafc;
      color: #1e1b4b;
      transition: border-color .14s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    textarea { resize: vertical; min-height: 100px; }

    .priority-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .priority-label {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500;
      padding: 7px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      color: #334155;
      transition: .14s;
    }
    .priority-label input { width: auto; padding: 0; background: none; border: none; box-shadow: none; }
    .priority-label:has(input:checked) { border-color: #4f46e5; background: #eef2ff; color: #4338ca; font-weight: 600; }
    .priority-label.urgent:has(input:checked) { border-color: #dc2626; background: #fef2f2; color: #dc2626; }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: background .14s;
    }
    .submit-btn:hover { background: #4338ca; }
    .submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #msgBox {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    #msgBox.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
    #msgBox.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-logo">LT</div>
    <div>
      <h1>Litpax Technology</h1>
      <p>Internal Staff Query System</p>
    </div>
  </div>

  <h2>Submit a Query</h2>
  <p class="subtitle">Apni query ya urgent decision yahan submit karo — owner ko turant notify hoga.</p>

  <div class="row">
    <div class="field">
      <label>Employee Name *</label>
      <input type="text" id="qName" placeholder="Apna naam likhein">
    </div>
    <div class="field">
      <label>Department *</label>
      <select id="qDept">
        <option value="">Select</option>
        <option>Store</option>
        <option>Production</option>
        <option>Dispatch</option>
        <option>Sales</option>
        <option>Repair</option>
        <option>Accounts</option>
        <option>Other</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Priority *</label>
    <div class="priority-row">
      <label class="priority-label">
        <input type="radio" name="priority" value="Low"> Low
      </label>
      <label class="priority-label">
        <input type="radio" name="priority" value="Medium" checked> Medium
      </label>
      <label class="priority-label urgent">
        <input type="radio" name="priority" value="Urgent"> 🔴 Urgent
      </label>
    </div>
  </div>

  <div class="field">
    <label>Subject *</label>
    <input type="text" id="qSubject" placeholder="Query ka short title">
  </div>

  <div class="field">
    <label>Description *</label>
    <textarea id="qDesc" placeholder="Poori detail likhein — kya chahiye, kab chahiye, kya problem hai..."></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitQuery()">Submit Query</button>
  <div id="msgBox"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwYJIxqDn7e6ejyQ1jGXSYb_hgTLGZFmoLsgzw4deI7u7Ow34GI6gxxJJlrNw8iruAg/exec';

async function submitQuery() {
  const name     = document.getElementById('qName').value.trim();
  const dept     = document.getElementById('qDept').value;
  const priority = document.querySelector('input[name="priority"]:checked')?.value;
  const subject  = document.getElementById('qSubject').value.trim();
  const desc     = document.getElementById('qDesc').value.trim();
  const btn      = document.getElementById('submitBtn');
  const msg      = document.getElementById('msgBox');

  msg.className = '';
  msg.style.display = 'none';

  if (!name || !dept || !subject || !desc) {
    msg.className = 'error';
    msg.textContent = '⚠️ Sab fields fill karna zaroori hai.';
    return;
  }

  btn.textContent = 'Submitting...';
  btn.disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'submitQuery', employeeName: name, department: dept, priority, subject, description: desc })
    });
    const data = await res.json();
    if (data.success) {
      msg.className = 'success';
      msg.textContent = `✅ Query submit ho gayi! Ticket ID: ${data.ticketID}`;
      document.getElementById('qName').value = '';
      document.getElementById('qDept').value = '';
      document.getElementById('qSubject').value = '';
      document.getElementById('qDesc').value = '';
    } else {
      msg.className = 'error';
      msg.textContent = '❌ Error aaya. Dobara try karo.';
    }
  } catch(err) {
    msg.className = 'error';
    msg.textContent = '❌ Network error. Baad mein try karo.';
  }

  btn.textContent = 'Submit Query';
  btn.disabled = false;
}
</script>

</body>
</html>

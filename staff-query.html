<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Query — Litpax Technology</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f2f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

    .screen { display: none; width: 100%; max-width: 520px; }
    .screen.active { display: block; }

    .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(30,27,75,.1); padding: 32px; margin-bottom: 16px; }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #e8eaf2; }
    .brand-logo { width: 36px; height: 36px; background: #4f46e5; border-radius: 9px; color: #fff; font-weight: 800; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .brand h1 { font-size: 15px; font-weight: 700; color: #1e1b4b; }
    .brand p  { font-size: 11px; color: #64748b; margin-top: 1px; }

    h2 { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 22px; }

    .field { margin-bottom: 14px; }
    label { font-size: 11px; font-weight: 600; color: #64748b; display: block; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-family: inherit; outline: none; background: #f8fafc; color: #1e1b4b; transition: border-color .14s;
    }
    input:focus, select:focus, textarea:focus { border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    textarea { resize: vertical; min-height: 90px; }

    .priority-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .priority-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; font-weight: 500; padding: 7px 14px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; color: #334155; transition: .14s; }
    .priority-label input { width: auto; padding: 0; background: none; border: none; box-shadow: none; }
    .priority-label:has(input:checked) { border-color: #4f46e5; background: #eef2ff; color: #4338ca; font-weight: 600; }
    .priority-label.urgent:has(input:checked) { border-color: #dc2626; background: #fef2f2; color: #dc2626; }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .14s; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #4f46e5; border: 1px solid #c7d2fe; margin-top: 8px; }
    .btn-outline:hover { background: #eef2ff; }

    .alert { margin-top: 12px; font-size: 13px; font-weight: 500; text-align: center; padding: 10px; border-radius: 8px; display: none; }
    .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
    .alert.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }

    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .dash-header h2 { margin-bottom: 0; }
    .user-pill { display: flex; align-items: center; gap: 8px; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 999px; padding: 5px 12px 5px 6px; }
    .user-avatar { width: 26px; height: 26px; background: #4f46e5; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .user-name { font-size: 12px; font-weight: 600; color: #3730a3; }
    .logout-btn { font-size: 11px; color: #94a3b8; background: none; border: none; cursor: pointer; margin-left: 4px; font-family: inherit; }
    .logout-btn:hover { color: #dc2626; }

    .new-query-btn { width: 100%; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 14px; transition: background .14s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .new-query-btn:hover { background: #4338ca; }

    .ticket-item { border: 1px solid #e8eaf2; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .ticket-top { padding: 12px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: background .14s; }
    .ticket-top:hover { background: #f8fafc; }
    .ticket-subject { font-size: 13px; font-weight: 600; color: #1e1b4b; }
    .ticket-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .status-Open        { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status-In-Progress { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .status-Closed      { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    .ticket-chat { display: none; padding: 14px; border-top: 1px solid #e8eaf2; background: #fafafa; }
    .ticket-chat.open { display: block; }
    .bubble-wrap { display: flex; flex-direction: column; gap: 10px; }
    .bubble { display: flex; flex-direction: column; }
    .bubble.employee { align-items: flex-start; }
    .bubble.owner, .bubble.owner-temp { align-items: flex-end; }
    .bubble-name { font-size: 10px; color: #94a3b8; margin-bottom: 3px; }
    .bubble-text { max-width: 85%; padding: 9px 13px; font-size: 12.5px; line-height: 1.55; font-weight: 500; }
    .bubble.employee .bubble-text { background: #eef2ff; color: #3730a3; border-radius: 12px 12px 12px 4px; }
    .bubble.owner-temp .bubble-text { background: #fffbeb; color: #92400e; border-radius: 12px 12px 4px 12px; }
    .bubble.owner .bubble-text { background: #f0fdf4; color: #15803d; border-radius: 12px 12px 4px 12px; }
    .bubble-time { font-size: 10px; color: #cbd5e1; margin-top: 3px; }
    .pending-msg { text-align: center; font-size: 11px; color: #94a3b8; padding: 8px; }

    /* Request To Cards */
    .request-to-row { display: flex; gap: 10px; }
    .request-card { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: .14s; background: #f8fafc; display: flex; align-items: center; gap: 10px; }
    .request-card:hover { border-color: #a5b4fc; background: #eef2ff; }
    .request-card.selected { border-color: #4f46e5; background: #eef2ff; }
    .request-card input { display: none; }
    .request-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .request-card-name { font-size: 13px; font-weight: 600; color: #1e1b4b; }
    .request-card-title { font-size: 10px; color: #64748b; margin-top: 1px; }
    .request-card.selected .request-card-name { color: #4338ca; }

    .empty-state { text-align: center; padding: 32px; color: #94a3b8; font-size: 13px; }

    @media (max-width: 480px) {
      .card { padding: 20px; }
      .request-to-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="loginScreen">
  <div class="card">
    <div class="brand">
      <div class="brand-logo">LT</div>
      <div>
        <h1>Litpax Technology</h1>
        <p>Staff Query System</p>
      </div>
    </div>
    <h2>Login</h2>
    <p class="subtitle">Apna Employee ID enter karo</p>
    <div class="field">
      <label>Employee ID *</label>
      <input type="text" id="loginEmpID" placeholder="Emp ID likhein" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login</button>
    <div class="alert" id="loginMsg"></div>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div class="screen" id="dashScreen">
  <div class="card">
    <div class="dash-header">
      <div>
        <h2 id="dashTitle">My Queries</h2>
        <p style="font-size:11px;color:#64748b;margin-top:2px;" id="dashSub"></p>
      </div>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar"></div>
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <button class="new-query-btn" onclick="showNewQuery()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Query
    </button>

    <div id="ticketsList"><div class="empty-state">Loading...</div></div>
  </div>
</div>

<!-- NEW QUERY SCREEN -->
<div class="screen" id="newQueryScreen">
  <div class="card">
    <div class="brand">
      <div class="brand-logo">LT</div>
      <div>
        <h1>New Query</h1>
        <p id="newQueryUser"></p>
      </div>
    </div>

    <!-- REQUEST TO -->
    <div class="field">
      <label>Request To *</label>
      <div class="request-to-row">
        <label class="request-card" id="card-sneha" onclick="selectRequestTo('Sneha Mam', 'card-sneha')">
          <input type="radio" name="requestTo" value="Sneha Mam">
          <div class="request-avatar" style="background:#8b5cf6;">SM</div>
          <div>
            <div class="request-card-name">Sneha Mam</div>
            <div class="request-card-title">Director</div>
          </div>
        </label>
        <label class="request-card" id="card-sahil" onclick="selectRequestTo('Sahil Sir', 'card-sahil')">
          <input type="radio" name="requestTo" value="Sahil Sir">
          <div class="request-avatar" style="background:#0ea5e9;">SS</div>
          <div>
            <div class="request-card-name">Sahil Sir</div>
            <div class="request-card-title">Director</div>
          </div>
        </label>
      </div>
    </div>

    <!-- PRIORITY -->
    <div class="field">
      <label>Priority *</label>
      <div class="priority-row">
        <label class="priority-label"><input type="radio" name="priority" value="Low"> Low</label>
        <label class="priority-label"><input type="radio" name="priority" value="Medium" checked> Medium</label>
        <label class="priority-label urgent"><input type="radio" name="priority" value="Urgent"> 🔴 Urgent</label>
      </div>
    </div>

    <div class="field">
      <label>Subject *</label>
      <input type="text" id="qSubject" placeholder="Query ka short title">
    </div>

    <div class="field">
      <label>Description *</label>
      <textarea id="qDesc" placeholder="Poori detail likhein..."></textarea>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitQuery()">Submit Query</button>
    <button class="btn btn-outline" onclick="showDash()">← Back</button>
    <div class="alert" id="submitMsg"></div>
  </div>
</div>

<script>
const GAS_QUERY_URL = 'https://script.google.com/macros/s/AKfycbz807fUw6omVhKTVtLXLYxDZrzgiTcqvh5gxXGMOKbvbV4r9vIWs_ScuRkzplS8V-ey/exec';

let currentUser = null;

function selectRequestTo(value, cardId) {
  document.querySelectorAll('.request-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(cardId).classList.add('selected');
  document.querySelector(`input[name="requestTo"][value="${value}"]`).checked = true;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showDash() { showScreen('dashScreen'); loadMyTickets(); }
function showNewQuery() {
  document.getElementById('newQueryUser').textContent = currentUser?.name || '';
  document.getElementById('qSubject').value = '';
  document.getElementById('qDesc').value = '';
  document.getElementById('submitMsg').className = 'alert';
  document.querySelectorAll('.request-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('input[name="requestTo"]').forEach(r => r.checked = false);
  showScreen('newQueryScreen');
}

async function doLogin() {
  const empID = document.getElementById('loginEmpID').value.trim();
  const msg   = document.getElementById('loginMsg');
  const btn   = document.getElementById('loginBtn');
  if (!empID) { showAlert(msg, 'error', '⚠️ Emp ID likhein'); return; }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  try {
    const res  = await fetch(GAS_QUERY_URL, { method: 'POST', body: JSON.stringify({ action: 'login', empID }) });
    const data = await res.json();
    if (data.success) {
      currentUser = { empID: data.empID, name: data.name };
      localStorage.setItem('ltxUser', JSON.stringify(currentUser));
      setupDash();
      showDash();
    } else {
      showAlert(msg, 'error', '❌ ' + (data.message || 'Emp ID galat hai'));
    }
  } catch(err) {
    showAlert(msg, 'error', '❌ Network error');
  }

  btn.textContent = 'Login';
  btn.disabled = false;
}

function setupDash() {
  const initials = currentUser.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('dashSub').textContent = 'Emp ID: ' + currentUser.empID;
}

function logout() {
  currentUser = null;
  localStorage.removeItem('ltxUser');
  document.getElementById('loginEmpID').value = '';
  document.getElementById('loginMsg').className = 'alert';
  showScreen('loginScreen');
}

async function loadMyTickets() {
  document.getElementById('ticketsList').innerHTML = '<div class="empty-state">Loading...</div>';
  try {
    const res  = await fetch(GAS_QUERY_URL, { method: 'POST', body: JSON.stringify({ action: 'getMyTickets', empID: currentUser.empID }) });
    const data = await res.json();
    if (!data.success || !data.tickets.length) {
      document.getElementById('ticketsList').innerHTML = '<div class="empty-state">Abhi koi query nahi — "New Query" se submit karo</div>';
      return;
    }
    document.getElementById('ticketsList').innerHTML = data.tickets.reverse().map((t, i) => {
      const sc = 'status-' + t.Status.replace(' ', '-');
      return `
        <div class="ticket-item">
          <div class="ticket-top" onclick="toggleChat(${i})">
            <div>
              <div class="ticket-subject">${t.Subject}</div>
              <div class="ticket-meta">${t.TicketID} · ${t['Request To'] ? t['Request To'] + ' · ' : ''}${t.Priority} · ${t.Timestamp}</div>
            </div>
            <span class="status-badge ${sc}">${t.Status}</span>
          </div>
          <div class="ticket-chat" id="chat-${i}">
            <div class="bubble-wrap">
              <div class="bubble employee">
                <div class="bubble-name">${t['Employee Name']}</div>
                <div class="bubble-text">${t.Description}</div>
              </div>
              ${t['Temp Response'] ? `<div class="bubble owner-temp"><div class="bubble-name">${t['Request To'] || 'Owner'}</div><div class="bubble-text">${t['Temp Response']}</div></div>` : ''}
              ${t['Final Response'] ? `<div class="bubble owner"><div class="bubble-name">${t['Request To'] || 'Owner'} (Final ✓)</div><div class="bubble-text">${t['Final Response']}</div>${t['Closed Date']?`<div class="bubble-time">Closed: ${t['Closed Date']}</div>`:''}</div>` : ''}
              ${!t['Temp Response'] && !t['Final Response'] ? `<div class="pending-msg">⏳ Response pending hai...</div>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(err) {
    document.getElementById('ticketsList').innerHTML = '<div class="empty-state" style="color:#dc2626">Error loading. Refresh karo.</div>';
  }
}

function toggleChat(i) {
  document.getElementById('chat-' + i).classList.toggle('open');
}

async function submitQuery() {
  const requestTo = document.querySelector('input[name="requestTo"]:checked')?.value;
  const priority  = document.querySelector('input[name="priority"]:checked')?.value;
  const subject   = document.getElementById('qSubject').value.trim();
  const desc      = document.getElementById('qDesc').value.trim();
  const msg       = document.getElementById('submitMsg');
  const btn       = document.getElementById('submitBtn');

  if (!requestTo) { showAlert(msg, 'error', '⚠️ Request To select karo'); return; }
  if (!subject || !desc) { showAlert(msg, 'error', '⚠️ Subject aur Description fill karo'); return; }

  btn.textContent = 'Submitting...';
  btn.disabled = true;

  try {
    const res  = await fetch(GAS_QUERY_URL, { method: 'POST', body: JSON.stringify({
      action: 'submitQuery', empID: currentUser.empID,
      employeeName: currentUser.name, department: '',
      priority, requestTo, subject, description: desc
    })});
    const data = await res.json();
    if (data.success) {
      showAlert(msg, 'success', `✅ Query submit ho gayi! ID: ${data.ticketID}`);
      setTimeout(() => showDash(), 1500);
    } else {
      showAlert(msg, 'error', '❌ Error aaya. Dobara try karo.');
    }
  } catch(err) {
    showAlert(msg, 'error', '❌ Network error.');
  }

  btn.textContent = 'Submit Query';
  btn.disabled = false;
}

function showAlert(el, type, text) {
  el.className = 'alert ' + type;
  el.textContent = text;
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ltxUser');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      setupDash();
      showDash();
    } catch(e) { localStorage.removeItem('ltxUser'); }
  }
});
</script>
</body>
</html>
